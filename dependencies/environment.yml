name: HEX-finder
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10.18
  - pip
  - wget
  - samtools=1.22.1
  - bedtools=2.31.1
  - numpy
  - pandas
  - pip:
    - "tensorflow[and-cuda]>=2.15"
    - keras-tcn=3.5.6
    - npy-append-array=0.9.19
    - colorama=0.4.6
    - biopython=1.86
    - plotly=6.0.1